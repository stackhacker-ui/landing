seo:
  title: Nuxt Landing Template
  description: A beautiful and customizable landing page template built with shadcn-vue.
title: "Observe less.\nUnderstand more."
description: Map your entire system in real-time, surface anomalies before they cascade, and eliminate the dashboards you never needed.
hero:
  headline: "v2.0 — Now with predictive alerting"
  links:
    - label: Start for free
      href: "https://ui.stackhacker.io/templates/landing"
      size: xl
      variant: default
    - label: View source
      href: "https://github.com/stackhacker-ui/landing#readme"
      size: xl
      variant: secondary
terminal:
  lines:
    - segments:
        - text: "$ "
          style: prompt
        - text: "npx telemetry"
          style: cmd
        - text: " init"
          style: flag
    - segments:
        - text: "→ Scanning service topology..."
          style: dim
    - segments:
        - text: "→ Found "
          style: dim
        - text: "23 services"
          style: cmd
        - text: ", "
          style: dim
        - text: "847 endpoints"
          style: cmd
        - text: ", "
          style: dim
        - text: "12 databases"
          style: cmd
    - segments:
        - text: "→ Deploying collector agents "
          style: dim
        - text: "✓"
          style: success
    - segments:
        - text: "→ Baseline established in "
          style: dim
        - text: "340ms"
          style: metric-good
    - segments:
        - text: " "
          style: dim
    - segments:
        - text: "✓ Live at "
          style: success
        - text: "https://app.example.com/acme-corp"
          style: url
logos:
  title: Trusted by engineering teams at
  items:
    [
      i-simple-icons-vercel,
      i-simple-icons-github,
      i-simple-icons-linear,
      i-simple-icons-supabase,
      i-simple-icons-stripe,
    ]
features:
  headline: Capabilities
  title: "Every signal, one surface."
  description: No more tab-switching between metrics, traces, and logs. Correlate everything into a single explorable topology.
  items:
    - icon: i-lucide-zap
      title: Predictive Alerts
      description: ML models trained on your baselines detect anomalies 4 minutes before they hit your SLOs.
    - icon: i-lucide-radar
      title: Topology Mapping
      description: Auto-discovers service dependencies with zero config. See how a deploy in auth-service ripples through checkout.
    - icon: i-lucide-layers
      title: Unified Telemetry
      description: "Logs, metrics, and traces in one query language. Stop context-switching. Start correlating."
    - icon: i-lucide-git-commit-horizontal
      title: Deploy Tracking
      description: Every deploy is automatically correlated with performance changes. Know which commit caused the regression.
    - icon: i-lucide-filter
      title: Smart Sampling
      description: "AI-driven sampling retains interesting traces and drops noise. Cut storage costs 10× without losing signal."
    - icon: i-lucide-notebook-pen
      title: Team Notebooks
      description: Collaborative investigation notebooks that turn incident debugging into reusable runbooks.
metrics:
  headline: By the numbers
  title: "Built for scale you haven't hit yet."
  description: Process billions of events per day across thousands of production environments with an architecture designed for the workloads of 2030.
  items:
    - value: "99.99%"
      label: Uptime SLA
      class: text-lime-400
    - value: "<50ms"
      label: P99 query
      class: text-primary
    - value: "14B+"
      label: Events / day
      class: text-blue-400
    - value: "4 min"
      label: Early warning
      class: text-amber-400
cta:
  title: "Ready to stop\nfirefighting?"
  description: Free for up to 5 services. No credit card. Deploys in under a minute.
  command: npx telemetry init
  links:
    - label: Start for free
      href: "https://github.com/stackhacker-ui/landing"
      size: xl
      variant: default
